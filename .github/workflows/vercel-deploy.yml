name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_ASHbDjwLNJ6LWW4SWsTb84qI
  VERCEL_PROJECT_ID: prj_svU253INNKTtKnTFMvQUNe66f2p1

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eventflow
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend test deps
        working-directory: eventflow/backend
        run: pip install -r ../requirements.txt pytest

      - name: Run API smoke tests
        working-directory: eventflow/backend
        run: pytest tests/test_api.py -q

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt
        run: vercel deploy --prebuilt --prod --functions-beta --token=${{ secrets.VERCEL_TOKEN }}
